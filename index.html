<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
    <header id="header">
    <div class="navbar">


        <div class="block1 border">
             <img src="logo.jpg" alt="Amazon logo" id="logo"></img>
        </div>
 

        <div class="block2 border">
            <p id="line1">Delivering to Navsari</p>
            <div id="line2"><i class="fa-solid fa-location-dot"></i>Update location</div>
        </div>


        <div class="block3">
            <div id="drop-down">
                <select id="block3_select">
                    <option>All </option>
                </select>    
            </div>
            <div id="search-bar">
                <input placeholder="Search Amazon.in" type="text" id="searchinput">
            </div>
            <div id="search-icon">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>

        </div>

        <div class="block4 border"> 
            <div id="line1_4">Hello, sign in</div>
            <div id="line2_4">
                <select id="select_4">
                    <option>Accounts & Lists</option>
                </select>
            </div>
        </div>

        <div class="block5 border"> 
            <div id="line1_5">Returns</div>
            <div id="line2_5">& Orders</div>
        
        </div>

        <div class="block6 border"> 
            <div id="line1_6"><i class="fa-solid fa-cart-shopping"></i></div>
            <div id="Cart">Cart</div>
        </div>
</div>
</header>
</body>
</html>
